name: Scrape WRC Data

on:
  schedule:
    # Run every Monday at 08:00 UTC (after weekend rallies)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      all_time:
        description: 'Fetch all historical data'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Scrape WRC Season
        run: |
          if [ "${{ github.event.inputs.all_time }}" == "true" ]; then
            python scripts/scrape_wrc.py --all-time
          else
            python scripts/scrape_wrc.py
          fi
          
      - name: Validate JSON Data
        run: python scripts/validate_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wrc/
          git commit -m "Automated update of WRC data" || echo "No changes to commit"
          git push
