name: Scrape F1 Data

on:
  schedule:
    # Run every Monday at 02:00 UTC (after race weekends)
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      all_time:
        description: 'Fetch all historical data'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push committed changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run F1 Scraper
        run: |
          if [ "${{ github.event.inputs.all_time }}" == "true" ]; then
            python scripts/scrape_f1.py --all-time
          else
            python scripts/scrape_f1.py
          fi

      - name: Compile Standings
        run: python scripts/compile_standings.py --series f1

      - name: Validate Data
        run: python scripts/validate_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new data changes to commit."
          else
            git commit -m "auto(data): update F1 data [skip ci]"
            git push
          fi
