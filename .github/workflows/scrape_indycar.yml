name: Scrape IndyCar Data

on:
  schedule:
    # Run every Monday at 06:00 UTC (after F1, MotoGP, and NASCAR)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allow manual execution via the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push committed changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run IndyCar Scraper
        run: python scripts/scrape_indycar.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new data changes to commit."
          else
            git commit -m "auto(data): update IndyCar data [skip ci]"
            git push
          fi
