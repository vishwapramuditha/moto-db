name: Scrape NASCAR Data

on:
  schedule:
    # Run every Monday at 05:00 UTC (after F1 and MotoGP)
    - cron: '0 5 * * 1'
  workflow_dispatch:
    # Allow manual execution via the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push committed changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run NASCAR Scraper
        run: python scripts/scrape_nascar.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new data changes to commit."
          else
            git commit -m "auto(data): update NASCAR data [skip ci]"
            git push
          fi
