<svg viewBox="0 0 600 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .speed-line { stroke: #d27154; stroke-width: 1.5; opacity: 0.4; }
    .car-chassis { stroke: #2c2825; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .rim { stroke: #d27154; stroke-width: 2.5; fill: none; }
    .tyre { stroke: #2c2825; stroke-width: 3; fill: #fcfaf5; }
    .tyre-inner { fill: #2c2825; }
    .tyre-hub { fill: #fcfaf5; }
    .dot-accent { fill: #d27154; opacity: 0.8; }
    
    @media (prefers-color-scheme: dark) {
      .car-chassis { stroke: #e2e8f0; }
      .tyre { stroke: #e2e8f0; fill: #0f172a; }
      .tyre-inner { fill: #e2e8f0; }
      .tyre-hub { fill: #0f172a; }
    }
  </style>

  <!-- Speed lines representing road motion -->
  <g stroke-dasharray="4 8">
    <line x1="50" y1="180" x2="550" y2="180" class="speed-line" />
    <line x1="30" y1="188" x2="570" y2="188" stroke-dasharray="10 15" stroke-width="2" class="speed-line" />
    <line x1="80" y1="172" x2="520" y2="172" stroke-dasharray="2 6" class="speed-line" />
  </g>
  
  <!-- Main Car Silhouette and Mechanical Parts -->
  <g class="car-chassis">
    <!-- Rear Wing -->
    <path d="M 90,80 L 130,80 L 130,115 L 105,145 L 80,145 Z" stroke-dasharray="3 3" />
    <path d="M 90,92 L 130,92" />
    <path d="M 90,104 L 125,104" />
    <path d="M 110,80 L 110,135" stroke-dasharray="2 2" />
    
    <!-- Engine Cover / Shark Fin -->
    <path d="M 130,90 L 180,85 L 230,70 L 250,70 L 255,80 L 245,105" />
    <path d="M 180,85 L 245,105" stroke-dasharray="2 3" />
    
    <!-- Airbox Intake -->
    <path d="M 230,70 C 235,55 255,55 260,70 L 262,85 Z" />
    <circle cx="245" cy="67" r="5" stroke="#d27154" />
    
    <!-- Engine Swoop -->
    <path d="M 260,78 C 280,105 315,110 330,110 L 330,145 L 205,145 L 185,120 Z" />
    <path d="M 270,95 C 290,120 310,130 330,135" stroke-dasharray="4 4" stroke="#d27154" />
    
    <!-- Sidepod Intake -->
    <path d="M 330,110 C 345,110 355,115 360,125 C 365,135 365,145 355,145 L 330,145" />
    <path d="M 345,112 C 345,125 335,135 330,138" stroke-dasharray="2 2" />
    
    <!-- Cockpit & Halo -->
    <path d="M 262,85 C 275,85 285,90 295,98 L 325,98 L 330,110" />
    <circle cx="282" cy="90" r="7" fill="#d27154" stroke="#d27154" />
    <path d="M 292,98 C 302,90 318,90 322,98" stroke-width="1.5" stroke-dasharray="2 2" />
    
    <!-- Nose Cone -->
    <path d="M 330,110 L 410,125 L 500,150 L 530,152 L 535,164 L 410,145 Z" />
    <path d="M 410,125 C 440,135 470,142 500,146" stroke-dasharray="5 5" />
    
    <!-- Suspension Arms -->
    <line x1="440" y1="131" x2="480" y2="145" stroke="#d27154" />
    <line x1="440" y1="140" x2="480" y2="145" stroke="#d27154" />
    <line x1="455" y1="134" x2="455" y2="142" stroke="#d27154" stroke-dasharray="1 2" />
    
    <line x1="150" y1="145" x2="190" y2="125" stroke="#d27154" />
    <line x1="150" y1="145" x2="190" y2="140" stroke="#d27154" />
    
    <!-- Front Wing -->
    <path d="M 530,152 L 555,154 L 560,168 L 528,168" />
    <path d="M 545,153 L 545,168" stroke-width="1.5" />
    <path d="M 555,154 L 565,154 L 565,162 L 558,162" stroke-dasharray="1 1" />
    
    <!-- Floor / Undertray -->
    <path d="M 205,147 L 410,147" stroke-width="3" stroke="#d27154" />
    <path d="M 180,149 L 430,149" stroke-width="1.5" stroke-dasharray="6 4" />
    
    <!-- Rear Wheel and Tyre -->
    <circle cx="150" cy="145" r="38" class="tyre" />
    <circle cx="150" cy="145" r="24" stroke-dasharray="6 4" class="rim" />
    <circle cx="150" cy="145" r="18" class="tyre-inner" />
    <circle cx="150" cy="145" r="6" class="tyre-hub" />
    
    <!-- Front Wheel and Tyre -->
    <circle cx="480" cy="145" r="38" class="tyre" />
    <circle cx="480" cy="145" r="24" stroke-dasharray="6 4" class="rim" />
    <circle cx="480" cy="145" r="18" class="tyre-inner" />
    <circle cx="480" cy="145" r="6" class="tyre-hub" />
  </g>
  
  <!-- Overlay Dotted Accent Elements -->
  <g class="dot-accent">
    <circle cx="150" cy="145" r="2.5" />
    <circle cx="480" cy="145" r="2.5" />
    <circle cx="230" cy="70" r="2" />
    <circle cx="250" cy="70" r="2" />
    <circle cx="330" cy="110" r="2.5" />
    <circle cx="410" cy="125" r="2" />
    <circle cx="500" cy="150" r="2" />
    <circle cx="130" cy="80" r="2" />
    <circle cx="90" cy="80" r="2" />
    <circle cx="80" cy="145" r="2.5" />
    <circle cx="555" cy="154" r="2" />
  </g>
</svg>
